<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новая вкладка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Desktop -->
    <div id="desktop">
        <div id="desktop-icons"></div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <button id="start-btn">
            <span class="start-logo"><svg class="start-flag" width="18" height="16" viewBox="0 0 22 20" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sf-r" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f86828"/><stop offset="100%" stop-color="#c02010"/></linearGradient><linearGradient id="sf-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a8d428"/><stop offset="100%" stop-color="#509808"/></linearGradient><linearGradient id="sf-b" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1878ec"/><stop offset="100%" stop-color="#0038b0"/></linearGradient><linearGradient id="sf-y" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe050"/><stop offset="100%" stop-color="#c87800"/></linearGradient></defs><path d="M0.5,0.5 C3,0.1 7.5,0.3 9,0.8 L9,8.8 C7.5,9.3 3,9.5 0.5,9.2 Z" fill="url(#sf-r)"/><path d="M10,0.5 C13.5,0.1 18,0.2 21.5,0.5 L21.5,8.5 C18,8.8 13.5,9 10,8.8 Z" fill="url(#sf-g)"/><path d="M0.5,10 C3,10.2 7.5,10.3 9,10.2 L9,19 C7.5,19.5 3,19.8 0.5,19.5 Z" fill="url(#sf-b)"/><path d="M10,10.2 C13.5,10 18,10.2 21.5,10.5 L21.5,19.5 C18,20 13.5,20.5 10,19.5 Z" fill="url(#sf-y)"/></svg></span>
            <span class="start-label">Пуск</span>
        </button>
        <div id="taskbar-sep"></div>
        <div id="quick-launch">
            <button class="ql-btn" id="ql-newtab"    title="Новая вкладка">🌐</button>
            <button class="ql-btn" id="ql-search"    title="Поиск">🔍</button>
            <button class="ql-btn" id="ql-mycomputer"title="Мой компьютер">💻</button>
            <button class="ql-btn" id="ql-notepad"   title="Блокнот">📝</button>
            <button class="ql-btn" id="ql-sticky"    title="Стикер">📌</button>
        </div>
        <div class="taskbar-sep-thin"></div>
        <div id="taskbar-windows"></div>
        <div id="systray">
            <div id="tray-update" title="Доступно обновление — нажмите для установки" class="hidden">🔔</div>
            <div id="tray-volume" title="Громкость">🔊</div>
            <div id="tray-clock">
                <div id="tray-time">00:00</div>
                <div id="tray-date">дата</div>
            </div>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="hidden">
        <div class="sm-header">
            <div class="sm-avatar">&#128100;</div>
            <div class="sm-username">User</div>
        </div>
        <div class="sm-body">
            <div id="sm-all-programs" class="hidden">
                <div class="sm-back-btn">
                    <span class="sm-icon">&#9664;</span>Назад
                </div>
                <div id="sm-programs-list"></div>
            </div>
            <div class="sm-left">
                <div class="sm-item" data-action="search">
                    <span class="sm-icon">&#128269;</span>Поиск в интернете
                </div>
                <div class="sm-separator"></div>
                <div class="sm-item" data-action="notepad">
                    <span class="sm-icon">&#128221;</span>Блокнот
                </div>
                <div class="sm-item" data-action="calculator">
                    <span class="sm-icon">&#128290;</span>Калькулятор
                </div>
                <div class="sm-item" data-action="minesweeper">
                    <span class="sm-icon">&#128163;</span>Сапёр
                </div>
                <div class="sm-item" data-action="solitaire">
                    <span class="sm-icon">&#9824;</span>Косынка
                </div>
                <div class="sm-item" data-action="hearts">
                    <span class="sm-icon">&#9829;</span>Червы
                </div>
                <div class="sm-item" data-action="pinball">
                    <span class="sm-icon">&#9899;</span>Пинбол
                </div>
                <div class="sm-item" data-action="paint">
                    <span class="sm-icon">&#127912;</span>Paint
                </div>
                <div class="sm-item" data-action="wordpad">
                    <span class="sm-icon">&#128196;</span>WordPad
                </div>
                <div class="sm-item" data-action="cmd">
                    <span class="sm-icon">&#9744;</span>Командная строка
                </div>
                <div class="sm-separator"></div>
                <div class="sm-item" data-action="settings">
                    <span class="sm-icon">&#9881;</span>Настройки
                </div>
                <div class="sm-separator"></div>
                <div class="sm-item" data-action="run">
                    <span class="sm-icon">&#9654;</span>Выполнить...
                </div>
                <div class="sm-item" data-action="taskmgr">
                    <span class="sm-icon">&#128202;</span>Диспетчер задач
                </div>
                <div class="sm-separator"></div>
                <div class="sm-item sm-allprograms-btn" data-action="allprograms">
                    <span class="sm-icon">&#128196;</span>Все программы
                    <span class="sm-allprograms-arrow">&#9658;</span>
                </div>
            </div>
            <div class="sm-right">
                <div class="sm-item" data-action="mycomputer">
                    <span class="sm-icon">&#128421;</span>Мой компьютер
                </div>
                <div class="sm-item" data-action="recycle">
                    <span class="sm-icon">&#128465;</span>Корзина
                </div>
                <div class="sm-separator"></div>
                <div class="sm-item" data-action="setbg">
                    <span class="sm-icon">&#128444;</span>Свой фон
                </div>
                <div class="sm-item" data-action="removebg">
                    <span class="sm-icon">&#10060;</span>Сбросить фон
                </div>
                <div class="sm-separator"></div>
                <div class="sm-item" data-action="export">
                    <span class="sm-icon">&#128190;</span>Экспорт данных
                </div>
                <div class="sm-item" data-action="import">
                    <span class="sm-icon">&#128193;</span>Импорт данных
                </div>
                <div class="sm-separator"></div>
                <div class="sm-item" data-action="update">
                    <span class="sm-icon">🔄</span>Обновить Windows XP
                </div>
            </div>
        </div>
        <div class="sm-footer">
            <button class="sm-shutdown-btn" data-action="shutdown">
                <span class="sm-shutdown-icon">&#9211;</span> Завершение работы
            </button>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="xp-context-menu hidden"></div>

    <!-- Hidden inputs -->
    <input type="file" id="bg-upload" accept="image/*" class="hidden">
    <input type="file" id="import-upload" accept=".json" class="hidden">

    <script src="script.js"></script>
</body>
</html>
