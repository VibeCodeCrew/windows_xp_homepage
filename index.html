<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новая вкладка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="controls">
        <button id="settings-btn">Настройки</button>
        <button id="upload-bg-btn">Свой фон</button>
        <input type="file" id="bg-upload" accept="image/*" class="hidden">
    </div>

    <div class="content">
        <div class="clock-container" id="clock-container">
            <div id="time">00:00</div>
            <div id="date">дата</div>
        </div>
        
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Введите запрос или адрес" autocomplete="off">
        </form>

        <div id="grid-container" class="grid-container"></div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <label class="checkbox-label" id="folder-checkbox-wrapper">
                <input type="checkbox" id="is-folder-checkbox">
                Это папка
            </label>
            <input type="text" id="tile-name" placeholder="Название (например, Игры)">
            
            <div id="url-container" class="url-container">
                <input type="text" id="tile-url" placeholder="Ссылка (https://...)">
                <input type="text" id="tile-icon" placeholder="Ссылка на иконку (оставь пустым для авто)">
            </div>
            
            <button id="save-tile-btn">Сохранить</button>
            <button id="close-modal-btn">Отмена</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <label>Колонок в ряду <input type="number" id="grid-cols-input" min="2" max="12" value="4"></label>
            <label>Ширина плиток <input type="range" id="tile-width-input" min="50" max="300" value="120"></label>
            <label>Высота плиток <input type="range" id="tile-height-input" min="50" max="300" value="100"></label>
            <label>Прозрачность <input type="range" id="tile-opacity-input" min="0" max="1" step="0.05" value="0.9"></label>
            <label class="checkbox-label" style="margin-top: 5px;">
                <input type="checkbox" id="tile-blur-input">
                Эффект стекла (размытие фона)
            </label>
            
            <div class="modal-actions-row">
                <button id="export-btn">Экспорт</button>
                <button id="import-btn">Импорт</button>
                <input type="file" id="import-upload" accept=".json" class="hidden">
            </div>

            <button id="close-settings-btn">Закрыть</button>
        </div>
    </div>

    <div id="context-menu" class="context-menu hidden">
        <div class="menu-item link-only" id="menu-new-tab">Открыть в новой вкладке</div>
        <div class="menu-item link-only" id="menu-new-window">Открыть в новом окне</div>
        <div class="menu-item link-only" id="menu-incognito">Открыть в режиме инкогнито</div>
        <div class="menu-separator link-only"></div>
        <div class="menu-item" id="menu-move-root" style="display: none;">На главный экран</div>
        <div class="menu-item" id="menu-edit">Изменить</div>
        <div class="menu-item menu-danger" id="menu-delete">Удалить</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
